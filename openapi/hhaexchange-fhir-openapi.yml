    PayerOnboardingInput:
      type: object
      required:
        - PayerId
      title: PayerOnboardingInput
      description: |
        One payer (Chha) item for **FhirPayer** onboarding and PATCH mapping updates.

        `PayerId` maps to `FHIR.ClientMappings.AgencyId`. When `Env` is omitted,
        empty, or whitespace-only, the server discovers the HHA tier using
        `dbo.tblchhamaster` across mirrors. When `Env` is set, it must be exactly
        app, app2, or cloud (case-insensitive, no leading or trailing spaces); the payer
        id must exist as `ChhaID` in `dbo.tblchhamaster` for that environment before mapping.
      properties:
        PayerId:
          type: integer
          exclusiveMinimum: 0
          title: Payerid
          description: >-
            Payer identifier (ChhaID in HHA dbo.tblchhamaster). Stored as
            ClientMappings.AgencyId.
        Env:
          anyOf:
            - type: string
            - type: 'null'
          title: Env
          description: >-
            Optional HHA environment: app, app2, or cloud (case-insensitive, no leading
            or trailing spaces). When omitted or empty, discovery uses
            dbo.tblchhamaster across tiers. When set, the payer id must exist in
            dbo.tblchhamaster for that environment.
        RateLimit:
          anyOf:
            - type: integer
            - type: 'null'
          title: Ratelimit
          description: >-
            Allowed requests per RateLimitWindow. Defaults to 50 when omitted. Must be a
            positive integer when provided (validated on write).
        RateLimitWindow:
          anyOf:
            - type: string
            - type: 'null'
          title: Ratelimitwindow
          description: >-
            Rate window granularity: Second or Minute (case-insensitive). Defaults to
            Minute when omitted (validated on write).
